<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Axis 絕對軸心</title>
    <!-- Core Styles -->
    <link rel="stylesheet" href="/static/css/index.css?v=10">
    <!-- Third-party scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

    <!-- 登入驗證層 (核心組件) -->
    <div id="login-overlay" class="login-overlay">
        <div style="background:#161b22;width:380px;padding:3.5rem;border-radius:18px;border:1px solid #30363d;text-align:center;">
            <h1 style="margin-bottom:2.5rem;font-size:2rem;color:var(--accent-color);font-weight:900;">LOGIN</h1>
            <input type="text" id="login-user" placeholder="User identity" class="t-input">
            <input type="password" id="login-pass" placeholder="Password" class="t-input" style="margin-bottom:2.5rem;">
            <button class="btn btn-primary" style="width:100%;height:52px;" onclick="doLogin()">Authorize Access</button>
        </div>
    </div>

    <!-- 左側導覽列 (靜態骨架) -->
    <aside class="sidebar">
        <div class="brand">
            <div class="logo-box" style="overflow:hidden;">
                <img src="/logo.jpg" style="width:100%; height:100%; object-fit:cover;">
            </div>
            ABSOLUTE AXIS
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" id="nav-dashboard" onclick="switchView('dashboard')">🏘️ 戰情總覽</li>
            <li class="nav-item" id="nav-virtual" onclick="switchView('virtual')">🖥️ 虛擬化中心</li>
            <li class="nav-item" id="nav-smart" onclick="switchView('smart')">🏡 智慧宅控</li>
            <li class="nav-item" id="nav-cloud" onclick="switchView('cloud')">☁️ 私有雲儲存</li>
            <li class="nav-item" id="nav-nas-mgnt" onclick="switchView('nas-mgnt')">🗄️ NAS 管理</li>
            <li class="nav-item" id="nav-metrics" onclick="switchView('metrics')">📊 實時數據分析</li>
            <li class="nav-item" id="nav-ai" onclick="switchView('ai')">🤖 核心助手</li>
            <div class="nav-separator"></div>
            <li class="nav-item" id="nav-admin" onclick="switchView('admin')" style="display:none">👥 帳號管理</li>
            <li class="nav-item" id="nav-settings" onclick="switchView('settings')">⚙️ 系統設定</li>
        </ul>
    </aside>

    <!-- 主要內容區 (動態注入容器) -->
    <main class="main-content">
        <header class="top-header">
            <div>
                <h2 id="page-title-text" style="font-size:1.5rem; font-weight:900; letter-spacing:0.5px;">戰情總覽</h2>
                <div style="font-size:0.75rem; color:var(--text-muted); font-weight:800; margin-top:5px; text-transform:uppercase;">
                    Network Control Center / <span id="clock" style="color:var(--accent-color);">--:--:--</span>
                </div>
            </div>
            <div style="display:flex; gap:18px; align-items:center;">
                <button id="theme-toggle" class="btn btn-outline" style="width:45px; height:45px; padding:0; border-radius:50%;" onclick="toggleTheme()">☀️</button>
                <div id="avatar-btn" style="width:45px; height:45px; border-radius:50%; overflow:hidden; border:2px solid var(--accent-color); cursor:pointer; background:var(--card-bg);" onclick="toggleAxisPopover(event)">
                    <img id="top-avatar" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
            </div>
        </header>

        <!-- Components (Views) will be injected here by app.js -->
    </main>

    <!-- Project Logic Modules -->
    <script src="/static/js/api.js?v=10"></script>
    <script src="/static/js/ui.js?v=10"></script>
    <script src="/static/js/nas.js?v=10"></script>
    <script src="/static/js/docker.js?v=10"></script>
    <script src="/static/js/dashboard.js?v=10"></script>
    <script src="/static/js/admin.js?v=10"></script>
    
    <!-- Application Entry Point (Modular Core) -->
    <script src="/static/js/app.js?v=10"></script>
</body>
</html>
