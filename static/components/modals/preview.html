<!-- Absolute Axis - Preview Modal Module -->
<div id="modal-preview" class="modal-overlay" style="display: none; background:rgba(0,0,0,0.95); z-index:10005;">
    <div style="width:90%; height:85%; background:var(--card-bg); border-radius:15px; display:flex; flex-direction:column; overflow:hidden; border:1px solid var(--border-color); box-shadow: 0 0 100px rgba(0,0,0,1);">
        <div style="padding:15px 25px; background:rgba(0,0,0,0.3); display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color);">
            <span id="preview-filename" style="font-weight:700; color:var(--accent-color); font-size:1.1rem; letter-spacing:0.5px;">--</span>
            <button onclick="closePreview()" class="btn btn-outline" style="min-width:40px; height:40px; padding:0; border-radius:50%;">✕</button>
        </div>
        <div id="preview-content" style="flex:1; overflow:auto; display:flex; justify-content:center; align-items:center; background:#000;">
            <!-- Renderers from nas.js (Img, Video, Text, etc) -->
        </div>
    </div>
</div>
