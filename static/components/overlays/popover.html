<!-- Absolute Axis - User Popover Overlay Module -->
<div id="user-popover" class="user-popover">
    <div style="display:flex; flex-direction:column; align-items:center; border-bottom:1px solid var(--border-color); padding-bottom:15px; margin-bottom:12px;">
        <img id="pop-avatar" src="" style="width:55px; height:55px; border-radius:50%; border:2px solid var(--accent-color); margin-bottom:10px; background:var(--bg-color);">
        <b id="pop-name" style="font-size:1rem; color:var(--text-main);">-- User --</b>
        <small id="pop-role" style="color:var(--accent-color); font-weight:800; text-transform:uppercase; margin-top:4px;">-- Role --</small>
    </div>
    <div style="display:flex; flex-direction:column; gap:5px;">
        <button class="btn btn-outline" style="width:100%; font-size:0.8rem; padding:8px;" onclick="switchView('settings'); toggleAxisPopover()">⚙️ 個人設定</button>
        <button class="btn btn-danger" style="width:100%; font-size:0.8rem; padding:8px;" onclick="doLogout()">🚪 登出系統</button>
    </div>
</div>
