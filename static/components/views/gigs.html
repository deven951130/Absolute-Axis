<div id="view-gigs" class="view-section">
    <!-- 頂部獨立導覽列（未登入時顯示） -->
    <header class="intro-navbar" id="gigs-intro-navbar" style="display:none; margin-bottom: 2rem; width: 100%;">
        <div style="display:flex;align-items:center;gap:3rem;">
            <div class="intro-brand">
                <div class="intro-logo-box">
                    <img src="/logo.jpg" alt="Absolute Axis Logo">
                </div>
                <span>ABSOLUTE AXIS</span>
            </div>
            <nav style="display:flex;gap:2rem;align-items:center;">
                <a onclick="switchView('pricing')" class="pricing-nav-link">服務定價</a>
                <a onclick="switchView('gigs')" class="pricing-nav-link active">接案中樞</a>
                <a onclick="switchView('intro')" class="pricing-nav-link">首頁</a>
            </nav>
        </div>
        <div class="intro-nav-actions">
            <button class="btn btn-outline" onclick="toggleTheme()" id="gigs-theme-btn" style="width:42px;height:42px;border-radius:50%;padding:0;font-size:1rem;">☀️</button>
            <div class="intro-logged-out-actions" style="display:flex; gap:10px; align-items:center;">
                <a onclick="showLoginOverlay()" class="btn btn-outline" style="border-radius:20px;font-weight:700;padding:10px 20px;cursor:pointer;text-decoration:none;">登入控制台</a>
                <button class="btn btn-primary" onclick="showLoginOverlay()" style="border-radius:20px;font-weight:800;padding:10px 22px;display:flex;align-items:center;gap:6px;">立即體驗 <span>›</span></button>
            </div>
            <div class="intro-logged-in-actions" style="display:none; gap:15px; align-items:center;">
                <div class="intro-avatar-btn" style="width:42px; height:42px; border-radius:50%; overflow:hidden; border:2px solid var(--accent-color); cursor:pointer; background:var(--card-bg);" onclick="toggleAxisPopover(event)">
                    <img class="intro-avatar-img" src="" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <button class="btn btn-primary" onclick="switchView('dashboard')" style="border-radius:20px; font-weight:800; padding:10px 22px;">打開控制台</button>
            </div>
        </div>
    </header>

    <div style="display:grid; grid-template-columns: 1fr 2fr; gap:2rem; width: 100%;">
        <!-- 發佈新案件 -->
        <div>
            <div class="card" style="position: sticky; top: 2rem;">
                <h3 style="margin-top: 0; margin-bottom: 1.5rem; color: var(--accent-color); font-weight: 900; letter-spacing: 0.5px;">發佈案件需求</h3>
                <div style="display:flex; flex-direction:column; gap:1.2rem;">
                    <div>
                        <label style="font-size:0.75rem; font-weight:800; color:var(--text-muted); display:block; margin-bottom:0.5rem;">案件名稱</label>
                        <input type="text" id="gig-title-input" placeholder="請輸入案件名稱" class="t-input">
                    </div>
                    <div>
                        <label style="font-size:0.75rem; font-weight:800; color:var(--text-muted); display:block; margin-bottom:0.5rem;">需求詳細描述</label>
                        <textarea id="gig-desc-input" placeholder="請詳細說明案件需求與驗證標準" class="t-input" style="height:120px; resize:none; font-family:inherit;"></textarea>
                    </div>
                    <div>
                        <label style="font-size:0.75rem; font-weight:800; color:var(--text-muted); display:block; margin-bottom:0.5rem;">專案預算 (TWD)</label>
                        <input type="number" id="gig-budget-input" placeholder="例如 5000" class="t-input">
                    </div>
                    <button class="btn btn-primary" onclick="submitGig()" style="height:48px; width:100%; font-weight:800; margin-top:0.5rem;">確認發佈案件</button>
                </div>
            </div>
        </div>

        <!-- 案件列表 -->
        <div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <h3 style="margin:0; color:var(--text-main); font-weight:900; letter-spacing:0.5px;">當前委託案件清單</h3>
                    <button class="btn btn-outline" style="padding:6px 12px; font-size:0.75rem;" onclick="loadGigs()">重新整理</button>
                </div>
                <div id="gigs-list-container" style="display:flex; flex-direction:column; gap:1rem;">
                    <div style="color:var(--text-muted); padding:2rem; text-align:center;">載入中...</div>
                </div>
            </div>
        </div>
    </div>
</div>
