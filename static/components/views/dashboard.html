<!-- Absolute Axis - Dashboard View Module -->
<div id="view-dashboard" class="view-section active">
    <!-- Stat Grid -->
    <div class="stat-grid">
        <div class="stat-card" style="cursor:pointer;" onclick="switchView('metrics')" title="點擊查看詳細負載曲線">
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 50">
                    <path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" />
                    <path id="cpu-gauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" />
                </svg>
                <span class="gauge-label" id="cpu-val">--%</span>
            </div>
            <div style="font-size:0.65rem;font-weight:800;color:var(--text-muted);margin-top:10px;">CPU 總體負載 (Metrics Link)</div>
        </div>
        <div class="stat-card" style="cursor:pointer;" onclick="switchView('metrics')" title="點擊查看詳細負載曲線">
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 50">
                    <path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" />
                    <path id="ram-gauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" />
                </svg>
                <span class="gauge-label" id="ram-val">--%</span>
            </div>
            <div style="font-size:0.65rem;font-weight:800;color:var(--text-muted);margin-top:10px;">RAM 使用率 (Metrics Link)</div>
        </div>
        <div class="stat-card">
            <div style="font-size:1.8rem;">🌡️</div>
            <div id="sensor-temp" style="font-weight:900; font-size:1.2rem; margin:8px 0;">--°C</div>
            <div style="font-size:0.6rem; color:var(--text-muted); font-weight:800;">主機環境溫度</div>
        </div>
        <div class="stat-card">
            <div style="font-size:1.8rem;">💧</div>
            <div id="sensor-humid" style="font-weight:900; font-size:1.2rem; margin:8px 0;">--%</div>
            <div style="font-size:0.6rem; color:var(--text-muted); font-weight:800;">環境相對濕度</div>
        </div>
        <div class="stat-card">
            <div style="font-size:1.8rem;">📶</div>
            <div style="text-align:center;">
                <div style="font-size:0.75rem;"><span style="color:var(--success-color)">▲</span> <span id="bw-up">0.0</span></div>
                <div style="font-size:0.75rem;"><span style="color:var(--danger-color)">▼</span> <span id="bw-dn">0.0</span></div>
            </div>
            <div style="font-size:0.6rem; color:var(--text-muted); font-weight:800; margin-top:5px;">流量出口吞吐量</div>
        </div>
    </div>

    <!-- Main Grid -->
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:2rem;">
        <div class="card" style="display:flex; flex-direction:column; padding:0; overflow:hidden; border-color:var(--border-color); background:rgba(0,0,0,0.2);">
            <div class="card-title" style="padding:1.8rem 1.8rem 0.5rem 1.8rem;">🖥️ 線上系統動作紀錄 (System Logs)</div>
            <div id="terminal-logs" style="flex:1; background: #000; padding:1.5rem; font-family:monospace; font-size:0.8rem; color:#0f0; overflow-y:auto; line-height:1.5; border-top:1px solid #30363d; min-height:220px; max-height:380px;">
                <div>[SYSTEM] 初始化戰情中心介面...</div>
            </div>
            <!-- 系統廣播輸入框 -->
            <div style="display:flex; gap:10px; background:#161b22; padding:15px; border-top:1px solid #30363d; z-index:100; position:relative;">
                <input type="text" id="msg-input" placeholder="發送系統廣播訊息..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #444; color:#fff; border-radius:6px; padding:10px 15px; font-size:0.85rem; outline:none; transition:0.2s;" onfocus="this.style.borderColor='var(--accent-color)'" onblur="this.style.borderColor='#444'" onkeypress="if(event.key==='Enter') broadCast()">
                <button class="btn btn-primary" style="padding:8px 20px; font-size:0.85rem; font-weight:800;" onclick="broadCast()">📡 發送廣播</button>
            </div>
        </div>
        
        <div style="display:flex; flex-direction:column; gap:1.5rem;">
            <!-- 儲存配額 (優先級 #1) -->
            <div class="card card-interactive" style="cursor:pointer; border-left: 4px solid var(--accent-color); padding: 1.2rem;" onclick="switchView('nas-mgnt')" title="點擊查看實體儲存空間細節">
                <div class="card-title" style="margin-bottom:1rem; font-size:0.85rem;">🗄️ 系統儲存配額 (Storage Link)</div>
                <div style="margin-bottom:1rem;">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:800; margin-bottom:5px;">
                        <span>SSD 系統硬碟</span><span id="sys-label">-- / --</span>
                    </div>
                    <div class="progress-bar" style="height:6px;"><div id="sys-bar" class="progress-fill" style="width:0%"></div></div>
                </div>
                <div>
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:800; margin-bottom:5px;">
                        <span>HDD 雲端資料碟</span><span id="nas-label">-- / --</span>
                    </div>
                    <div class="progress-bar" style="height:6px;"><div id="nas-bar" class="progress-fill" style="width:0%"></div></div>
                </div>
            </div>

            <!-- 核心服務 (優先級 #2 - 從底層提拔) -->
            <div class="card" style="padding: 1.2rem;">
                <div class="card-title" style="margin-bottom:1rem; font-size:0.85rem;">⚙️ 基礎核心服務狀態</div>
                <div id="svc-list" style="display:flex; flex-direction:column; gap:4px;"></div>
            </div>

            <!-- GitHub 監控眼 (優先級 #3 - 移至下方) -->
            <div class="card gh-card" style="position:relative; overflow:hidden; padding: 1.2rem;">
                <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; font-size:0.85rem;">
                    <span>🚀 GitHub Vitality Monitor</span>
                    <span id="gh-dot" class="status-dot"></span>
                </div>
                <div style="padding:0;">
                    <div style="font-size:0.85rem; font-weight:900; color:#58a6ff; display:flex; align-items:center; gap:8px;">
                        <svg height="14" width="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                        <span id="gh-repo" style="font-size:0.8rem;">Absolute-Axis</span>
                    </div>
                    <div style="font-size:0.7rem; color:var(--text-muted); margin-top:5px; line-height:1.3; border-left:2px solid #30363d; padding-left:8px; font-style:italic;" id="gh-commit">同步中...</div>
                    <div style="font-size:0.6rem; color:var(--text-muted); margin-top:8px; display:flex; justify-content:space-between; font-weight:800;">
                        <span id="gh-time">Last Sync: --</span>
                        <span id="gh-stars" style="color:#e3b341;">⭐ --</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
