<!-- Absolute Axis - Dashboard View Module -->
<div id="view-dashboard" class="view-section active">
    <!-- Stat Grid -->
    <div class="stat-grid">
        <div class="stat-card" style="cursor:pointer;" onclick="switchView('metrics')" title="點擊查看詳細負載曲線">
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 50">
                    <path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" />
                    <path id="cpu-gauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" />
                </svg>
                <span class="gauge-label" id="cpu-val">--%</span>
            </div>
            <div style="font-size:0.65rem;font-weight:800;color:var(--text-muted);margin-top:10px;">CPU 總體負載 (Metrics Link)</div>
        </div>
        <div class="stat-card" style="cursor:pointer;" onclick="switchView('metrics')" title="點擊查看詳細負載曲線">
            <div class="gauge-container">
                <svg class="gauge-svg" viewBox="0 0 100 50">
                    <path class="gauge-bg" d="M10 45 A 35 35 0 0 1 90 45" />
                    <path id="ram-gauge" class="gauge-fill" d="M10 45 A 35 35 0 0 1 90 45" />
                </svg>
                <span class="gauge-label" id="ram-val">--%</span>
            </div>
            <div style="font-size:0.65rem;font-weight:800;color:var(--text-muted);margin-top:10px;">RAM 使用率 (Metrics Link)</div>
        </div>
        <div class="stat-card">
            <div style="font-size:1.8rem;">🌡️</div>
            <div id="sensor-temp" style="font-weight:900; font-size:1.2rem; margin:8px 0;">--°C</div>
            <div style="font-size:0.6rem; color:var(--text-muted); font-weight:800;">主機環境溫度</div>
        </div>
        <div class="stat-card">
            <div style="font-size:1.8rem;">💧</div>
            <div id="sensor-humid" style="font-weight:900; font-size:1.2rem; margin:8px 0;">--%</div>
            <div style="font-size:0.6rem; color:var(--text-muted); font-weight:800;">環境相對濕度</div>
        </div>
        <div class="stat-card">
            <div style="font-size:1.8rem;">📶</div>
            <div style="text-align:center;">
                <div style="font-size:0.75rem;"><span style="color:var(--success-color)">▲</span> <span id="bw-up">0.0</span></div>
                <div style="font-size:0.75rem;"><span style="color:var(--danger-color)">▼</span> <span id="bw-dn">0.0</span></div>
            </div>
            <div style="font-size:0.6rem; color:var(--text-muted); font-weight:800; margin-top:5px;">流量出口吞吐量</div>
        </div>
    </div>

    <!-- Main Grid -->
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:2rem;">
        <div class="card" style="display:flex; flex-direction:column; padding:0; overflow:hidden; border-color:var(--border-color); background:rgba(0,0,0,0.2);">
            <div class="card-title" style="padding:1.8rem 1.8rem 0.5rem 1.8rem;">🖥️ 線上系統動作紀錄 (System Logs)</div>
            <div id="terminal-logs" style="flex:1; background: #000; padding:1.5rem; font-family:monospace; font-size:0.8rem; color:#0f0; overflow-y:auto; line-height:1.5; border-top:1px solid #30363d; min-height:220px; max-height:380px;">
                <div>[SYSTEM] 初始化戰情中心介面...</div>
            </div>
            <!-- 系統廣播輸入框 -->
            <div style="display:flex; gap:10px; background:#161b22; padding:15px; border-top:1px solid #30363d; z-index:100; position:relative;">
                <input type="text" id="msg-input" placeholder="發送系統廣播訊息..." style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #444; color:#fff; border-radius:6px; padding:10px 15px; font-size:0.85rem; outline:none; transition:0.2s;" onfocus="this.style.borderColor='var(--accent-color)'" onblur="this.style.borderColor='#444'" onkeypress="if(event.key==='Enter') broadCast()">
                <button class="btn btn-primary" style="padding:8px 20px; font-size:0.85rem; font-weight:800;" onclick="broadCast()">📡 發送廣播</button>
            </div>
        </div>
        
        <div style="display:flex; flex-direction:column; gap:2rem;">
            <!-- 核心服務 -->
            <div class="card">
                <div class="card-title">⚙️ 基礎核心服務狀態</div>
                <div id="svc-list" style="display:flex; flex-direction:column; gap:5px;"></div>
            </div>

            <!-- 儲存配額 -->
            <div class="card card-interactive" style="cursor:pointer;" onclick="switchView('nas-mgnt')" title="點擊查看實體儲存空間細節">
                <div class="card-title">🗄️ 系統儲存配額 (Storage Link)</div>
                <div style="margin-bottom:1.5rem;">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:800; margin-bottom:8px;">
                        <span>SSD 系統硬碟</span><span id="sys-label">-- / --</span>
                    </div>
                    <div class="progress-bar"><div id="sys-bar" class="progress-fill" style="width:0%"></div></div>
                </div>
                <div>
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:800; margin-bottom:8px;">
                        <span>HDD 雲端資料碟</span><span id="nas-label">-- / --</span>
                    </div>
                    <div class="progress-bar"><div id="nas-bar" class="progress-fill" style="width:0%"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>
