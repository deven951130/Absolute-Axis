<!-- Absolute Axis - Settings View Module -->
<div id="view-settings" class="view-section">
    <div id="settings-main">
        <div class="settings-list">
            <div class="settings-item" onclick="openSettingPanel('panel-identity')">🔑 個人身分與安全密碼</div>
            <div class="settings-item" onclick="openSettingPanel('panel-system')">💻 伺服器規格與核心資訊</div>
            <div class="settings-item" onclick="openSettingPanel('panel-theme')">🎨 主題色彩實驗室 (Collab)</div>
            <div class="settings-item" onclick="openSettingPanel('panel-features')">⚙️ 模組化功能控制</div>
        </div>
    </div>
    
    <!-- 1. Identity Panel -->
    <div id="panel-identity" class="settings-panel">
        <button class="btn btn-outline" style="margin-bottom:1.5rem;" onclick="closeSettingPanel()">⬅ 返回首頁</button>
        <div class="card">
            <div style="display:flex; flex-direction:column; gap:12px;">
                <button class="btn btn-primary" style="width:100%; padding:12px;" onclick="window.openProfileEdit()">修改名稱與密碼</button>
                <button class="btn btn-outline" style="width:100%; padding:12px; border-color:rgba(255,255,255,0.2) !important; background:rgba(255,255,255,0.05);" onclick="window.openAvatarEdit()">更換頭像網址</button>
            </div>
        </div>
    </div>

    <!-- 2. System Info Panel -->
    <div id="panel-system" class="settings-panel">
        <button class="btn btn-outline" style="margin-bottom:1.5rem;" onclick="closeSettingPanel()">⬅ 返回首頁</button>
        <div class="card">
            <div id="sys-specs-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:1.2rem;">
                <!-- Auto-injected specs -->
            </div>
        </div>
    </div>

    <!-- 3. Features Control Panel -->
    <div id="panel-features" class="settings-panel">
        <button class="btn btn-outline" style="margin-bottom:1.5rem;" onclick="closeSettingPanel()">⬅ 返回首頁</button>
        <div class="card">
            <h2 class="card-title" style="margin-bottom: 1.5rem;">側邊欄模組顯示設定</h2>
            <div style="display:flex; flex-direction:column; gap:1.5rem; align-items:flex-start; padding: 1rem 0;">
                <label style="display:flex; align-items:center; gap:12px; font-size:1.1rem; cursor:pointer; color:var(--text-main); user-select:none;">
                    <input type="checkbox" id="feature-gigs" onchange="window.toggleFeature('gigs', this.checked)" style="width:1.3rem; height:1.3rem; accent-color:var(--accent-color);"> 接案功能
                </label>
                <label style="display:flex; align-items:center; gap:12px; font-size:1.1rem; cursor:pointer; color:var(--text-main); user-select:none;">
                    <input type="checkbox" id="feature-opensource" onchange="window.toggleFeature('opensource', this.checked)" style="width:1.3rem; height:1.3rem; accent-color:var(--accent-color);"> 開源專案分享
                </label>
                <label style="display:flex; align-items:center; gap:12px; font-size:1.1rem; cursor:pointer; color:var(--text-main); user-select:none;">
                    <input type="checkbox" id="feature-multiverse" onchange="window.toggleFeature('multiverse', this.checked)" style="width:1.3rem; height:1.3rem; accent-color:var(--accent-color);"> Minecraft 伺服器
                </label>
            </div>
            
            <!-- 管理者專屬的開源專案設定區塊 -->
            <div id="os-config-admin-section" style="display:none; border-top:1px dashed var(--border-color); padding-top:1.5rem; margin-top:0.5rem; flex-direction:column; gap:14px; width:100%;">
                <h3 style="margin:0; font-size:1.05rem; font-weight:900; color:var(--accent-color);">🔗 開源專案平台資訊設定</h3>
                
                <div style="display:flex; flex-direction:column; gap:6px; width:100%;">
                    <span style="font-size:0.75rem; font-weight:800; color:var(--text-muted);">開發者 GitHub 帳號名稱</span>
                    <input type="text" id="cfg-os-name" placeholder="例如: deven951130" class="t-input" style="max-width: 400px; font-weight:800;">
                </div>
                
                <div style="display:flex; flex-direction:column; gap:6px; width:100%;">
                    <span style="font-size:0.75rem; font-weight:800; color:var(--text-muted);">開發者 GitHub 主頁連結</span>
                    <input type="text" id="cfg-os-url" placeholder="例如: https://github.com/deven951130" class="t-input" style="max-width: 400px; font-weight:800;">
                </div>
                
                <div style="display:flex; flex-direction:column; gap:6px; width:100%;">
                    <span style="font-size:0.75rem; font-weight:800; color:var(--text-muted);">GitHub 個人存取權杖 (GITHUB_TOKEN)</span>
                    <input type="password" id="cfg-os-token" placeholder="已設定時顯示遮罩。填入新權杖以覆寫，保留空白則維持現狀" class="t-input" style="max-width: 400px; font-weight:800;">
                </div>
                
                <button class="btn btn-primary" style="padding:10px 20px; font-size:0.8rem; font-weight:800; align-self:flex-start; margin-top:6px;" onclick="window.saveOSConfig()">儲存開源專案設定</button>
            </div>
        </div>
    </div>

    <!-- 4. Theme Lab Panel -->
    <div id="panel-theme" class="settings-panel">
        <button class="btn btn-outline" style="margin-bottom:1.5rem;" onclick="closeSettingPanel()">⬅ 返回首頁</button>
        <div class="card">
            <h2 class="card-title">全域配色方案 (Accent Themes)</h2>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:1.2rem;">
                <div class="stat-card" style="cursor:pointer;" onclick="setTheme('default')">🌑 深度海洋 (Blue)</div>
                <div class="stat-card" style="cursor:pointer; border-color:#f2aa1f;" onclick="setTheme('gold')">☀️ 琥珀金芒 (Gold)</div>
                <div class="stat-card" style="cursor:pointer; border-color:#ff66b3;" onclick="setTheme('pink')">💖 霓虹粉彩 (Pink)</div>
                <div class="stat-card" style="cursor:pointer; border-color:#2ecc71;" onclick="setTheme('green')">🍃 矩陣翡翠 (Green)</div>
                <div class="stat-card" style="cursor:pointer; border-color:#ff4d4d;" onclick="setTheme('red')">🔥 熔岩烈焰 (Red)</div>
                <div class="stat-card" style="cursor:pointer; border-color:#bd93f9;" onclick="setTheme('purple')">🔮 紫晶皇家 (Purple)</div>
            </div>
        </div>
    </div>
</div>
