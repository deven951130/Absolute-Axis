version: '3.8'

services:
  axis-server:
    build: .
    container_name: axis-server
    restart: always
    network_mode: host
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - TZ=Asia/Taipei
      # 綁定至 Tailscale IP (從 .env 讀取，預設為全監聽)
      - HOST_IP=${HOST_IP:-0.0.0.0}
    volumes:
      - .:/app
      - ./nas:/app/nas
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev:/dev
    privileged: true
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: axis-cloudflared
    restart: always
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run

  minecraft-server:
    image: itzg/minecraft-server
    container_name: axis-mc
    restart: unless-stopped
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      MEMORY: "10G"
      # 使用 CUSTOM 模式，這樣它會直接執行資料夾內的啟動檔或主程式
      TYPE: "CUSTOM"
      CUSTOM_JAR_EXEC: "bash start.sh" # 如果是 Forge/Fabric 整合包通常會有 start.sh
      # 若沒有 start.sh，itzg 映像檔也有自動化尋找機制
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 10.5G
    volumes:
      - ./minecraft-data:/data
